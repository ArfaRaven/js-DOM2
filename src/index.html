<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Фото Галерея</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <p>photo gallery</p>
</header>

<div class="slider-wrapper" id="sliderWrapper">
  <div class="slider-track" id="sliderTrack">
    <div class="empty-state" id="emptyState">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <p>Галерея порожня</p>
    </div>
  </div>
  <button class="slider-btn prev" id="prevBtn" onclick="slide(-1)">&#8592;</button>
  <button class="slider-btn next" id="nextBtn" onclick="slide(1)">&#8594;</button>
</div>

<div class="dots" id="dots"></div>

<div class="controls">
  <button class="btn btn-primary" onclick="loadMore()">+ Завантажити ще 4</button>
  <button class="btn btn-outline btn-flip" onclick="flipGallery()">&#8644; Перевернути</button>
  <button class="btn btn-outline" onclick="removeLast()">&#8722; Видалити останню</button>
  <button class="btn btn-danger" onclick="clearGallery()">&#215; Очистити галерею</button>
</div>

<p id="status" class="loading">Завантаження...</p>

<script src="gallery.js"></script>
</body>
</html>
